[tools]
zig = "0.16.0"

[tasks.build]
run = "zig build"
description = "Build sporevm"

[tasks.install]
run = "zig build --release=safe --prefix \"$HOME\""
description = "Install optimized spore into ~/bin"

[tasks.test]
run = "zig build test"
description = "Run unit tests"

[tasks.check]
run = "mise run test && mise run build && git diff --check"
description = "Run unit tests, build, and diff hygiene"

[tasks."smoke:run"]
run = "mise run build && scripts/smoke-run.sh"
description = "Smoke product spore run streaming and exit status"

[tasks."smoke:run-capture"]
run = "mise run build && scripts/smoke-run-capture.sh"
description = "Smoke product spore run signal capture and resume"

[tasks."smoke:run-net-config"]
run = "mise run build && scripts/smoke-run-net-config.sh"
description = "Smoke product spore run static network configuration"

[tasks."smoke:run-net-dns"]
run = "mise run build && scripts/smoke-run-net-dns.sh"
description = "Smoke product spore run DNS proxying"

[tasks."smoke:run-net-http"]
run = "mise run build && scripts/smoke-run-net-http.sh"
description = "Smoke product spore run outbound HTTP proxying"

[tasks."smoke:run-net-deny"]
run = "mise run build && scripts/smoke-run-net-deny.sh"
description = "Smoke product spore run hard-floor egress denial"

[tasks."smoke:run-net-capture"]
run = "mise run build && scripts/smoke-run-net-capture.sh"
description = "Smoke network policy persistence across capture and run --from"

[tasks."smoke:counter-fanout"]
run = "mise run build && scripts/smoke-counter-fanout.sh"
description = "Smoke capture, fork, and resume counter fan-out"

[tasks."smoke:rootfs-fanout"]
run = "mise run build && scripts/smoke-rootfs-fanout.sh"
description = "Smoke OCI rootfs capture, fork, and run-from child execution"

[tasks."smoke:local-pull"]
run = "mise run build && scripts/smoke-local-pull.sh"
description = "Smoke local file:// pull materialization and resumed rootfs fan-out"

[tasks.smoke]
run = "mise run build && scripts/smoke-run.sh && scripts/smoke-run-capture.sh"
description = "Run product smoke tests"
