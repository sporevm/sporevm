[tools]
gh = "2.89.0"
svu = "3.4.1"
zig = "0.16.0"

[tasks.build]
run = "zig build"
description = "Build sporevm (Debug; use build:release for shipped settings)"

[tasks."build:release"]
run = "zig build --release=safe"
description = "Build sporevm with the shipped ReleaseSafe settings"

[tasks.install]
run = "zig build --release=safe --prefix \"$HOME\""
description = "Install optimized spore into ~/bin"

[tasks.test]
run = "zig build test && python3 scripts/benchmark/parse-save-metrics.py --self-test && python3 scripts/benchmark/named-restore-readiness.py --self-test && python3 scripts/benchmark/named-restore-readiness-test.py && bash scripts/ci/named-restore-release-inputs-test.sh"
description = "Run unit tests and benchmark parser contract checks"

[tasks."test:rootfs-slow"]
run = "zig build rootfs-slow-test"
description = "Run slow rootfs/ext4 conformance tests"

[tasks.docs]
run = "zig build docs"
description = "Generate libspore API documentation"

[tasks.check]
run = "mise run test && mise run build && git diff --check"
description = "Run unit tests, build, and diff hygiene"

[tasks.release]
depends = ["check"]
run = "scripts/release/tag.sh"
description = "Tag the next version and push to trigger a Buildkite release"

[tasks."release:prepare"]
run = "scripts/release/prepare.sh"
description = "Update source and package versions for a release"

[tasks."release:snapshot"]
run = "scripts/release/build-assets.sh"
description = "Build local release archives without publishing"

[tasks."smoke:run"]
run = "mise run build && test/smoke/run/basic.sh"
description = "Smoke product spore run streaming and exit status"

[tasks."smoke:run-stdin"]
run = "mise run build && test/smoke/run/stdin.sh"
description = "Smoke product spore run interactive stdin forwarding"

[tasks."smoke:run-env"]
run = "mise run build && test/smoke/run/env.sh"
description = "Smoke product spore run command environment"

[tasks."smoke:run-tty"]
run = "mise run build && test/smoke/run/tty.sh"
description = "Smoke product spore run one-shot TTY mode"

[tasks."smoke:run-attach"]
run = "mise run build && test/smoke/run/attach.sh"
description = "Smoke product spore run interactive attach"

[tasks."smoke:run-inject"]
run = "mise run build && test/smoke/run/inject.sh"
description = "Smoke product spore run injected files"

[tasks."smoke:run-image-commit"]
run = "mise run build && test/smoke/run/image-commit.sh"
description = "Smoke image commit, ref stability, and warm two-child fan-out"

[tasks."smoke:run-disk-size"]
run = "mise run build && test/smoke/run/disk-size.sh"
description = "Smoke absolute image-commit disk growth and fail-closed sizing"

[tasks."smoke:build-rootfs-capacity"]
run = "mise run build:release && test/smoke/rootfs/build-capacity.sh"
description = "Smoke prepared build output save/restore, bundle transfer, commit reuse, and above-cap inheritance"

[tasks."smoke:build-publication"]
run = "mise run build:release && test/smoke/rootfs/build-publication.sh"
description = "Smoke concurrent PREPARE reuse and fail-closed build publication boundaries"

[tasks."smoke:run-file-locking"]
run = "mise run build && test/smoke/run/file-locking.sh"
description = "Smoke product spore run guest file locking support"

[tasks."smoke:run-cgroup"]
run = "mise run build && test/smoke/run/cgroup.sh"
description = "Smoke product spore run guest cgroup2 support"

[tasks."smoke:run-auto-memory"]
run = "mise run build && test/smoke/run/auto-memory.sh"
description = "Smoke product spore run automatic memory growth"

[tasks."smoke:lifecycle-auto-memory"]
run = "mise run build && test/smoke/lifecycle/auto-memory.sh"
description = "Smoke named lifecycle automatic memory backing and save stats"

[tasks."smoke:run-capture"]
run = "mise run build && test/smoke/run/capture.sh"
description = "Smoke product spore run signal save and attach"

[tasks."smoke:multi-vcpu"]
run = "mise run build && test/smoke/fanout/multi-vcpu.sh"
description = "Smoke multi-vCPU boot, save, run-from, attach, and (with SPORE_SMOKE_NAMED_LIFECYCLE=1) non-destructive named save while still ticking"

[tasks."smoke:lifecycle"]
run = "mise run build && test/smoke/lifecycle/basic.sh"
description = "Smoke named lifecycle create, exec, ls, and rm"

[tasks."smoke:lifecycle-copy"]
run = "mise run build && test/smoke/lifecycle/copy.sh"
description = "Smoke named lifecycle copy-in and copy-out"

[tasks."smoke:lifecycle-tty"]
run = "mise run build && test/smoke/lifecycle/tty.sh"
description = "Smoke named lifecycle noninteractive, interactive, and TTY exec streaming"

[tasks."smoke:monitor-jail"]
run = "mise run build && test/smoke/monitor/jail.sh"
description = "Smoke the monitor jail denied-operation path"

[tasks."smoke:monitor-failure-modes"]
run = "mise run build && test/smoke/monitor/failure-modes.sh"
description = "Smoke monitor signal, guest OOM, and killed-monitor cleanup behavior"

[tasks."smoke:libspore-standalone-go"]
run = "mise run build && test/smoke/libspore/standalone-go.sh"
description = "Smoke Go libspore named lifecycle without spore on PATH"

[tasks."smoke:run-net-config"]
run = "mise run build && test/smoke/network/config.sh"
description = "Smoke product spore run static network configuration"

[tasks."smoke:run-net-dns"]
run = "mise run build && test/smoke/network/dns.sh"
description = "Smoke product spore run DNS proxying"

[tasks."smoke:run-net-http"]
run = "mise run build && test/smoke/network/http.sh"
description = "Smoke product spore run outbound HTTP proxying"

[tasks."smoke:net-egress"]
run = "mise run build && test/smoke/network/egress.sh"
description = "Smoke real public HTTPS egress with allow rules (gated by SPORE_SMOKE_EGRESS=1)"

[tasks."smoke:run-net-deny"]
run = "mise run build && test/smoke/network/deny.sh"
description = "Smoke product spore run hard-floor egress denial"

[tasks."smoke:run-net-bind-service"]
run = "mise run build && test/smoke/network/bind-service.sh"
description = "Smoke product spore run bound Unix service proxying"

[tasks."smoke:run-net-bind-service-oci"]
run = "mise run build && test/smoke/network/bind-service-oci.sh"
description = "Smoke OCI guest bound Unix service DNS and proxying"

[tasks."smoke:run-net-forward"]
run = "mise run build && test/smoke/network/forward.sh"
description = "Smoke product spore run host-to-guest TCP forwarding"

[tasks."smoke:run-net-capture"]
run = "mise run build && test/smoke/network/capture.sh"
description = "Smoke network policy persistence across save and run --from"

[tasks."smoke:counter-fanout"]
run = "mise run build && test/smoke/fanout/counter.sh"
description = "Smoke save, fork, and attach counter fan-out"

[tasks."smoke:rootfs-fanout"]
run = "mise run build && test/smoke/fanout/rootfs.sh"
description = "Smoke OCI rootfs save, fork, and run-from child execution"

[tasks."smoke:live-rootfs-fanout"]
run = "mise run build && bash test/smoke/fanout/live-rootfs.sh"
description = "Smoke live OCI rootfs save, fork, and attach child identity"

[tasks."smoke:named-disk-fork"]
run = "mise run build && test/smoke/fanout/named-disk-fork.sh"
description = "Smoke disk-backed named live fork, divergence, leases, and nested save/restore"

[tasks."smoke:writable-rootfs"]
run = "mise run build && test/smoke/rootfs/writable.sh"
description = "Smoke writable rootfs disk layer save and run-from replay"

[tasks."benchmark:writable-rootfs"]
run = "mise run build:release && scripts/benchmark/writable-rootfs.sh --iterations 1"
description = "Benchmark writable rootfs COW, sealed append, and replay paths"

[tasks."benchmark:disk-fork"]
run = "SPOREVM_DISK_FORK_BENCHMARK=1 zig test src/chunk_mapped_disk.zig -O ReleaseFast -lc --test-filter 'disk fork benchmark'"
description = "Benchmark native disk-head cloning, 32-child preparation, and generation-32 reads"

[tasks."smoke:local-pull"]
run = "mise run build && test/smoke/fanout/local-pull.sh"
description = "Smoke local file:// pull materialization and restored rootfs fan-out"

[tasks.smoke]
run = "mise run build && test/smoke/run/basic.sh && test/smoke/run/capture.sh"
description = "Run product smoke tests"

[tasks."benchmark:smoke"]
run = "mise run build:release && scripts/benchmark/suite.py --profile smoke --no-build"
description = "Run a quick benchmark-suite smoke profile"

[tasks."benchmark:ci"]
run = "mise run build:release && scripts/benchmark/suite.py --profile ci --no-build"
description = "Run the short CI benchmark profile and write comparable JSON output"

[tasks."benchmark:comparison"]
run = "mise run build:release && scripts/benchmark/suite.py --profile comparison --no-build"
description = "Run the heavier all-dimension comparison benchmark profile"

[tasks."benchmark:nightly"]
run = "mise run build:release && scripts/benchmark/suite.py --profile nightly --no-build"
description = "Run the scheduled benchmark guardrail profile"

[tasks."benchmark:full"]
run = "mise run build:release && scripts/benchmark/suite.py --profile full --no-build"
description = "Run the full benchmark suite"

[tasks."benchmark:compare"]
run = "scripts/benchmark/compare.py"
description = "Compare two benchmark summary JSON files"

[tasks."benchmark:detect-regressions"]
run = "scripts/benchmark/detect_regressions.py"
description = "Detect benchmark regressions against trailing history"

[tasks."benchmark:rootfs-writers"]
run = "mise run build && scripts/benchmark/rootfs-writers.py --no-build"
description = "Compare native and external rootfs writer phase timings"

[tasks."benchmark:export"]
run = "scripts/benchmark/export-site-data.py zig-cache/sporevm-benchmarks/latest-summary.json"
description = "Export latest benchmark summary as static trend data"
