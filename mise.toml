[tools]
gh = "2.89.0"
svu = "3.4.1"
zig = "0.16.0"

[tasks.build]
run = "zig build"
description = "Build sporevm (Debug; use build:release for shipped settings)"

[tasks."build:release"]
run = "zig build --release=safe"
description = "Build sporevm with the shipped ReleaseSafe settings"

[tasks.install]
run = "zig build --release=safe --prefix \"$HOME\""
description = "Install optimized spore into ~/bin"

[tasks.test]
run = "zig build test"
description = "Run unit tests"

[tasks.docs]
run = "zig build docs"
description = "Generate libspore API documentation"

[tasks.check]
run = "mise run test && mise run build && git diff --check"
description = "Run unit tests, build, and diff hygiene"

[tasks.release]
depends = ["check"]
run = "scripts/release.sh"
description = "Tag the next version and push to trigger a Buildkite release"

[tasks."release:snapshot"]
run = "scripts/build-release-assets.sh"
description = "Build local release archives without publishing"

[tasks."smoke:run"]
run = "mise run build && scripts/smoke-run.sh"
description = "Smoke product spore run streaming and exit status"

[tasks."smoke:run-stdin"]
run = "mise run build && scripts/smoke-run-stdin.sh"
description = "Smoke product spore run interactive stdin forwarding"

[tasks."smoke:run-tty"]
run = "mise run build && scripts/smoke-run-tty.sh"
description = "Smoke product spore run one-shot TTY mode"

[tasks."smoke:run-attach"]
run = "mise run build && scripts/smoke-run-attach.sh"
description = "Smoke product spore run interactive attach"

[tasks."smoke:run-inject"]
run = "mise run build && scripts/smoke-run-inject.sh"
description = "Smoke product spore run injected files"

[tasks."smoke:run-file-locking"]
run = "mise run build && scripts/smoke-run-file-locking.sh"
description = "Smoke product spore run guest file locking support"

[tasks."smoke:run-cgroup"]
run = "mise run build && scripts/smoke-run-cgroup.sh"
description = "Smoke product spore run guest cgroup2 support"

[tasks."smoke:run-auto-memory"]
run = "mise run build && scripts/smoke-run-auto-memory.sh"
description = "Smoke product spore run automatic memory growth"

[tasks."smoke:lifecycle-auto-memory"]
run = "mise run build && scripts/smoke-lifecycle-auto-memory.sh"
description = "Smoke named lifecycle automatic memory backing and suspend stats"

[tasks."smoke:run-capture"]
run = "mise run build && scripts/smoke-run-capture.sh"
description = "Smoke product spore run signal capture and resume"

[tasks."smoke:multi-vcpu"]
run = "mise run build && scripts/smoke-multi-vcpu.sh"
description = "Smoke multi-vCPU boot, capture, run-from, and resume"

[tasks."smoke:lifecycle"]
run = "mise run build && scripts/smoke-lifecycle.sh"
description = "Smoke named lifecycle create, exec, ls, and rm"

[tasks."smoke:lifecycle-copy"]
run = "mise run build && scripts/smoke-lifecycle-copy.sh"
description = "Smoke named lifecycle copy-in and copy-out"

[tasks."smoke:lifecycle-tty"]
run = "mise run build && scripts/smoke-lifecycle-tty.sh"
description = "Smoke named lifecycle interactive exec streaming"

[tasks."smoke:monitor-jail"]
run = "mise run build && scripts/smoke-monitor-jail.sh"
description = "Smoke the monitor jail denied-operation path"

[tasks."smoke:monitor-failure-modes"]
run = "mise run build && scripts/smoke-monitor-failure-modes.sh"
description = "Smoke monitor signal, guest OOM, and killed-monitor cleanup behavior"

[tasks."smoke:run-net-config"]
run = "mise run build && scripts/smoke-run-net-config.sh"
description = "Smoke product spore run static network configuration"

[tasks."smoke:run-net-dns"]
run = "mise run build && scripts/smoke-run-net-dns.sh"
description = "Smoke product spore run DNS proxying"

[tasks."smoke:run-net-http"]
run = "mise run build && scripts/smoke-run-net-http.sh"
description = "Smoke product spore run outbound HTTP proxying"

[tasks."smoke:run-net-deny"]
run = "mise run build && scripts/smoke-run-net-deny.sh"
description = "Smoke product spore run hard-floor egress denial"

[tasks."smoke:run-net-bind-service"]
run = "mise run build && scripts/smoke-run-net-bind-service.sh"
description = "Smoke product spore run bound Unix service proxying"

[tasks."smoke:run-net-forward"]
run = "mise run build && scripts/smoke-run-net-forward.sh"
description = "Smoke product spore run host-to-guest TCP forwarding"

[tasks."smoke:run-net-capture"]
run = "mise run build && scripts/smoke-run-net-capture.sh"
description = "Smoke network policy persistence across capture and run --from"

[tasks."smoke:counter-fanout"]
run = "mise run build && scripts/smoke-counter-fanout.sh"
description = "Smoke capture, fork, and resume counter fan-out"

[tasks."smoke:rootfs-fanout"]
run = "mise run build && scripts/smoke-rootfs-fanout.sh"
description = "Smoke OCI rootfs capture, fork, and run-from child execution"

[tasks."smoke:live-rootfs-fanout"]
run = "mise run build && bash scripts/smoke-live-rootfs-fanout.sh"
description = "Smoke live OCI rootfs capture, fork, and resume child identity"

[tasks."smoke:writable-rootfs"]
run = "mise run build && scripts/smoke-writable-rootfs.sh"
description = "Smoke writable rootfs disk layer capture and run-from replay"

[tasks."benchmark:writable-rootfs"]
run = "mise run build:release && scripts/benchmark-writable-rootfs.sh --iterations 1"
description = "Benchmark writable rootfs COW, sealed append, and replay paths"

[tasks."smoke:local-pull"]
run = "mise run build && scripts/smoke-local-pull.sh"
description = "Smoke local file:// pull materialization and resumed rootfs fan-out"

[tasks."validate:release-a1-kvm"]
run = "bash scripts/validate-release-a1-kvm.sh"
description = "Run repeatable A1/KVM release validation over SSM remote hosts"

[tasks.smoke]
run = "mise run build && scripts/smoke-run.sh && scripts/smoke-run-capture.sh"
description = "Run product smoke tests"

[tasks."benchmark:smoke"]
run = "mise run build:release && scripts/benchmark-sporevm-suite.py --profile smoke --no-build"
description = "Run a quick benchmark-suite smoke profile"

[tasks."benchmark:ci"]
run = "mise run build:release && scripts/benchmark-sporevm-suite.py --profile ci --no-build"
description = "Run the short CI benchmark profile and write comparable JSON output"

[tasks."benchmark:comparison"]
run = "mise run build:release && scripts/benchmark-sporevm-suite.py --profile comparison --no-build"
description = "Run the heavier all-dimension comparison benchmark profile"

[tasks."benchmark:full"]
run = "mise run build:release && scripts/benchmark-sporevm-suite.py --profile full --no-build"
description = "Run the full benchmark suite"

[tasks."benchmark:compare"]
run = "scripts/compare-sporevm-benchmarks.py"
description = "Compare two benchmark summary JSON files"

[tasks."benchmark:export"]
run = "scripts/export-sporevm-benchmark-data.py zig-cache/sporevm-benchmarks/latest-summary.json"
description = "Export latest benchmark summary as static trend data"
