steps:
  - label: ":zig: Build & Test (Linux)"
    key: "test-linux"
    command: |
      mise install
      mise exec -- zig build test --summary all
      mise exec -- zig fmt --check build.zig src
    plugins:
      - mise#a5845c5082d3a4fe36dd77ae74973dfc86fc91a2:
          version: "2026.5.12"
    cache:
      paths:
        - "~/.local/share/mise"
        - "~/.cache/mise"
        - "~/.local/state/mise"
      size: "20g"
      name: "mise-cache"
    agents:
      queue: sporevm-linux-arm64

  - label: ":zig: Build & Test (macOS)"
    key: "test-macos"
    command: |
      mise install
      mise exec -- zig build test --summary all
    plugins:
      - mise#a5845c5082d3a4fe36dd77ae74973dfc86fc91a2:
          version: "2026.5.12"
    cache:
      paths:
        - "~/.local/share/mise"
        - "~/.cache/mise"
        - "~/.local/state/mise"
      size: "20g"
      name: "mise-cache"
    agents:
      queue: sporevm-mac

  - label: ":ext4: Slow Rootfs Tests (Linux)"
    key: "rootfs-slow-test-linux"
    if: build.env("SPOREVM_RUN_ROOTFS_SLOW_TESTS") == "1"
    command: |
      mise install
      mise exec -- zig build rootfs-slow-test --summary all
    plugins:
      - mise#a5845c5082d3a4fe36dd77ae74973dfc86fc91a2:
          version: "2026.5.12"
    cache:
      paths:
        - "~/.local/share/mise"
        - "~/.cache/mise"
        - "~/.local/state/mise"
      size: "20g"
      name: "mise-cache"
    agents:
      queue: sporevm-linux-arm64

  - label: ":package: Build Linux ARM64 release archive"
    key: "release-linux-arm64"
    if: build.tag != null
    command: |
      mise install
      scripts/build-release-assets.sh --target linux-arm64 --output dist
    artifact_paths:
      - "dist/spore_Linux_arm64.tar.gz"
      - "dist/libspore_Linux.tar.gz"
    plugins:
      - mise#a5845c5082d3a4fe36dd77ae74973dfc86fc91a2:
          version: "2026.5.12"
    cache:
      paths:
        - "~/.local/share/mise"
        - "~/.cache/mise"
        - "~/.local/state/mise"
      size: "20g"
      name: "mise-cache"
    agents:
      queue: sporevm-linux-arm64

  - label: ":package: Build macOS ARM64 release archive"
    key: "release-darwin-arm64"
    if: build.tag != null
    command: |
      mise install
      scripts/build-release-assets.sh --target darwin-arm64 --output dist
    artifact_paths:
      - "dist/spore_Darwin_arm64.tar.gz"
      - "dist/libspore_Darwin.tar.gz"
    plugins:
      - mise#a5845c5082d3a4fe36dd77ae74973dfc86fc91a2:
          version: "2026.5.12"
    cache:
      paths:
        - "~/.local/share/mise"
        - "~/.cache/mise"
        - "~/.local/state/mise"
      size: "20g"
      name: "mise-cache"
    agents:
      queue: sporevm-mac

  - wait

  - trigger: "sporevm-benchmarks"
    label: ":chart_with_upwards_trend: Trigger Benchmark Suite"
    async: true
    if: build.branch == "main" || build.env("SPOREVM_RUN_BENCHMARKS") == "1"
    build:
      branch: "${BUILDKITE_BRANCH}"
      commit: "${BUILDKITE_COMMIT}"
      message: "${BUILDKITE_MESSAGE}"

  - wait

  - label: ":rocket: Publish release"
    key: "release-publish"
    depends_on:
      - "test-linux"
      - "test-macos"
      - "release-linux-arm64"
      - "release-darwin-arm64"
    if: build.tag != null
    command: |
      mise install
      scripts/ci-buildkite-release.sh
    plugins:
      - mise#a5845c5082d3a4fe36dd77ae74973dfc86fc91a2:
          version: "2026.5.12"
    cache:
      paths:
        - "~/.local/share/mise"
        - "~/.cache/mise"
        - "~/.local/state/mise"
      size: "20g"
      name: "mise-cache"
    agents:
      queue: hosted
