steps:
  - label: ":zig: Build & Test (Linux)"
    command: |
      mise install
      mise exec -- zig build test --summary all
      mise exec -- zig fmt --check build.zig src
    plugins:
      - mise#a5845c5082d3a4fe36dd77ae74973dfc86fc91a2:
          version: "2026.5.12"
    cache:
      paths:
        - "~/.local/share/mise"
        - "~/.cache/mise"
        - "~/.local/state/mise"
      size: "20g"
      name: "mise-cache"
    agents:
      queue: cleanroom

  - label: ":zig: Build & Test (macOS)"
    command: |
      mise install
      mise exec -- zig build test --summary all
    plugins:
      - mise#a5845c5082d3a4fe36dd77ae74973dfc86fc91a2:
          version: "2026.5.12"
    cache:
      paths:
        - "~/.local/share/mise"
        - "~/.cache/mise"
        - "~/.local/state/mise"
      size: "20g"
      name: "mise-cache"
    agents:
      queue: cleanroom-mac

  - label: ":chart_with_upwards_trend: Benchmark Suite"
    if: build.env("SPOREVM_RUN_BENCHMARKS") == "1"
    command: |
      upload_benchmark_artifacts() {
        buildkite-agent artifact upload "zig-cache/sporevm-benchmarks/**/*" || true
      }
      trap upload_benchmark_artifacts EXIT

      mise install
      mise run build
      scripts/benchmark-sporevm-suite.py --profile "${SPOREVM_BENCHMARK_PROFILE:-ci}" --no-build
      if [[ -n "${SPOREVM_BENCHMARK_BASELINE:-}" ]]; then
        scripts/compare-sporevm-benchmarks.py "${SPOREVM_BENCHMARK_BASELINE}" zig-cache/sporevm-benchmarks/latest-summary.json
      fi
    plugins:
      - mise#a5845c5082d3a4fe36dd77ae74973dfc86fc91a2:
          version: "2026.5.12"
    cache:
      paths:
        - "~/.local/share/mise"
        - "~/.cache/mise"
        - "~/.local/state/mise"
      size: "20g"
      name: "mise-cache"
    agents:
      queue: cleanroom

  - wait

  - label: ":rocket: Publish release"
    if: build.tag != null
    command: |
      mise install
      scripts/ci-buildkite-release.sh
    plugins:
      - mise#a5845c5082d3a4fe36dd77ae74973dfc86fc91a2:
          version: "2026.5.12"
    cache:
      paths:
        - "~/.local/share/mise"
        - "~/.cache/mise"
        - "~/.local/state/mise"
      size: "20g"
      name: "mise-cache"
    agents:
      queue: cleanroom-mac
